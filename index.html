  <link rel="stylesheet" href="css/style.css" />

<body>

<div id="stars-bg"></div>

<!-- Intro Section -->
<div class="intro fade-in" id="introBox">
  <h2 id="introHeading"></h2>
  <p id="introPara"></p>
  <button class="btn btn-custom mt-3" id="startBtn" onclick="showMemories()" style="display: none;">
    <i class="fas fa-arrow-right"></i> Click Here
  </button>
</div>

<!-- Memory Section -->
<div class="memory-box hidden" id="memoriesSection">
  <div class="memory-progress" id="memoryProgress"></div>
  <div id="topText" class="mb-3 fs-5"><span id="topTypewriter"></span></div>
  <img id="memoryImage" class="memory-img" src="" alt="memory image" />
  <div id="bottomText" class="fs-6"><span id="bottomTypewriter"></span></div>
  <button id="nextBtn" class="btn btn-next mt-3">Next</button>
</div>

<!-- Map Animation Section -->
<div class="memory-box hidden" id="mapSection">
  <p class="map-subtitle" id="mapSubtitle"></p>
  <div class="map-container">
    <svg viewBox="0 0 500 300" class="map-svg">
      <defs>
        <clipPath id="clipLahore"><circle cx="380" cy="240" r="22"/></clipPath>
        <clipPath id="clipIslamabad"><circle cx="150" cy="100" r="22"/></clipPath>
        <filter id="heartGlow">
          <feGaussianBlur in="SourceGraphic" stdDeviation="3.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- faint full-heart outline (dashed guide) -->
      <path d="M 265,207 C 281,201 299,189 299,173 C 299,158 284,150 265,163 C 246,150 231,158 231,173 C 231,189 249,201 265,207"
            fill="none" stroke="rgba(251,191,36,0.15)" stroke-width="1.8" stroke-dasharray="6 5"/>
      <!-- RIGHT half: Lahore → heart bottom tip → right lobe → center valley -->
      <path id="routeLineLahore"
            d="M 380,240 C 355,235 308,219 265,207 C 281,201 299,189 299,173 C 299,158 284,150 265,163"
            fill="none" stroke="#fbbf24" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <!-- LEFT half: Islamabad → heart bottom tip → left lobe → center valley -->
      <path id="routeLineIslamabad"
            d="M 150,100 C 182,118 232,165 265,207 C 249,201 231,189 231,173 C 231,158 246,150 265,163"
            fill="none" stroke="#fbbf24" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- Lahore -->
      <image href="img/Me_1.jpg" x="358" y="218" width="44" height="44" clip-path="url(#clipLahore)" preserveAspectRatio="xMidYMid slice"/>
      <circle cx="380" cy="240" r="22" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="380" cy="240" r="22" fill="none" stroke="#fbbf24" stroke-width="1.5" class="city-pulse-ring"/>
      <text x="380" y="272" fill="#fbbf24" font-family="Poppins,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Lahore</text>
      <!-- Islamabad -->
      <image href="img/Zee.png" x="128" y="78" width="44" height="44" clip-path="url(#clipIslamabad)" preserveAspectRatio="xMidYMid slice"/>
      <circle cx="150" cy="100" r="22" fill="none" stroke="#fbbf24" stroke-width="2"/>
      <circle cx="150" cy="100" r="22" fill="none" stroke="#fbbf24" stroke-width="1.5" class="city-pulse-ring"/>
      <text x="150" y="132" fill="#fbbf24" font-family="Poppins,sans-serif" font-size="12" font-weight="600" text-anchor="middle">Islamabad</text>

      <circle id="centerSparkle" cx="265" cy="163" r="0" fill="none" opacity="0"/>
    </svg>
  </div>
  <p class="map-message" id="mapMessage"></p>
</div>

<!-- Cake Section -->
<div class="memory-box hidden" id="cakeSection">
  <p class="map-subtitle" id="cakeTitle"></p>
  <div class="cake-wrap" style="position:relative;">
    <svg viewBox="0 0 560 260" class="cake-svg" id="cakeSvg">
      <defs>
        <linearGradient id="gradBotFace" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#4a0020"/>
          <stop offset="30%"  stop-color="#9d174d"/>
          <stop offset="70%"  stop-color="#be185d"/>
          <stop offset="100%" stop-color="#831843"/>
        </linearGradient>
        <linearGradient id="gradTopFace" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#831843"/>
          <stop offset="30%"  stop-color="#be185d"/>
          <stop offset="70%"  stop-color="#e11d7a"/>
          <stop offset="100%" stop-color="#9d174d"/>
        </linearGradient>
        <radialGradient id="gradSurface" cx="50%" cy="40%" r="55%">
          <stop offset="0%"   stop-color="#fbcfe8"/>
          <stop offset="100%" stop-color="#db2777"/>
        </radialGradient>
        <filter id="cakeShadow">
          <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="rgba(0,0,0,0.5)"/>
        </filter>
        <filter id="goldGlow">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feMerge>
            <feMergeNode in="blur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>

      <!-- Ground shadow -->
      <ellipse cx="280" cy="252" rx="210" ry="9" fill="rgba(0,0,0,0.35)"/>

      <!-- ===== BOTTOM TIER ===== -->
      <rect x="55" y="168" width="450" height="72" rx="5" fill="url(#gradBotFace)" filter="url(#cakeShadow)"/>
      <ellipse cx="280" cy="168" rx="225" ry="17" fill="url(#gradSurface)"/>
      <ellipse cx="280" cy="168" rx="225" ry="17" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
      <!-- Bottom frosting drips -->
      <path d="M55,168 C68,155 74,172 87,168 C100,156 107,173 120,168 C133,157 140,172 153,168 C166,157 173,172 186,168 C199,157 206,172 219,168 C232,157 239,172 252,168 C265,157 272,172 285,168 C298,157 305,172 318,168 C331,157 338,172 351,168 C364,157 371,172 384,168 C397,157 404,172 417,168 C430,157 437,172 450,168 C463,157 470,172 483,168 C496,157 503,172 505,168"
            fill="rgba(255,255,255,0.92)"/>
      <!-- Gold pearl dots - bottom tier -->
      <circle cx="150" cy="199" r="3.5" fill="#fbbf24" opacity="0.9"/>
      <circle cx="213" cy="192" r="3"   fill="#f59e0b" opacity="0.9"/>
      <circle cx="280" cy="200" r="3.5" fill="#fbbf24" opacity="0.9"/>
      <circle cx="347" cy="192" r="3"   fill="#f59e0b" opacity="0.9"/>
      <circle cx="410" cy="199" r="3.5" fill="#fbbf24" opacity="0.9"/>
      <!-- Decorative dashed line - bottom tier -->
      <line x1="60" y1="214" x2="500" y2="214" stroke="rgba(251,191,36,0.55)" stroke-width="1.5" stroke-dasharray="6 4"/>
      <rect x="55" y="168" width="450" height="72" rx="5" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>

      <!-- ===== TOP TIER ===== -->
      <rect x="125" y="97" width="310" height="71" rx="5" fill="url(#gradTopFace)" filter="url(#cakeShadow)"/>
      <ellipse cx="280" cy="97" rx="155" ry="13" fill="url(#gradSurface)"/>
      <ellipse cx="280" cy="97" rx="155" ry="13" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
      <!-- Top frosting drips -->
      <path d="M125,97 C137,86 143,100 156,97 C169,86 175,101 188,97 C201,86 207,101 220,97 C233,86 239,101 252,97 C265,86 271,101 284,97 C297,86 303,101 316,97 C329,86 335,101 348,97 C361,86 367,101 380,97 C393,86 399,101 412,97 C424,90 435,97 435,97"
            fill="rgba(255,255,255,0.92)"/>
      <rect x="125" y="97" width="310" height="71" rx="5" fill="none" stroke="rgba(251,191,36,0.3)" stroke-width="1"/>

      <!-- Gold star decoration - top tier center -->
      <text x="262" y="143" fill="#fbbf24" font-size="16" opacity="0.8" filter="url(#goldGlow)">✦</text>
      <text x="280" y="143" fill="#fbbf24" font-size="14" opacity="0.65" filter="url(#goldGlow)">✦</text>
      <text x="297" y="143" fill="#fbbf24" font-size="16" opacity="0.8" filter="url(#goldGlow)">✦</text>
      <!-- Gold pearl dots - top tier -->
      <circle cx="200" cy="155" r="2.8" fill="#fbbf24" opacity="0.9"/>
      <circle cx="245" cy="158" r="3.2" fill="#f59e0b" opacity="0.9"/>
      <circle cx="280" cy="158" r="2.8" fill="#fbbf24" opacity="0.9"/>
      <circle cx="315" cy="158" r="3.2" fill="#f59e0b" opacity="0.9"/>
      <circle cx="360" cy="155" r="2.8" fill="#fbbf24" opacity="0.9"/>

      <!-- Candles (generated by JS) -->
      <g id="candlesGroup"></g>
    </svg>
    <div id="windOverlay" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;"></div>
  </div>
  <button class="btn btn-custom mt-2" id="blowBtn">💨 Blow the Candles!</button>
</div>

<!-- Birthday Wish Section -->
<div class="wish hidden" id="wishBox">
  <!-- <div class="balloons">🎈🎈🎈🎈🎈</div> -->
  <div class="balloons text-danger">
    <i class="fas fa-heart"></i>
    <i class="fas fa-heart"></i>
    <i class="fas fa-heart"></i>
    <i class="fas fa-heart"></i>
    <i class="fas fa-heart"></i>
  </div>
  <h3>For You</h3>
  <div id="birthdayMessage" style="font-size: 20px; line-height: 1.8;"></div>
  <button class="btn btn-custom mt-4" onclick="location.reload()">Replay</button>
</div>

<canvas id="confetti-canvas"></canvas>
<script src="js/script.js"></script>

</body>
</html>
